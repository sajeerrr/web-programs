<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Form</title>
    </head>
    
    <body>
        <h2>Form</h2>
        <form>
            <label for="name">Enter Name :</label>
            <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

            <label for="email">Enter email :</label>
            <input type="text" id="email" name="email" placeholder="Enter your email"><br><br>

            <label for="phone">Enter phone :</label>
            <input type="text" id="phone" name="phone" placeholder="Enter your phone"><br><br>

            <label for="pwd">Enter password :</label>
            <input type="password" id="pwd" name="pwd"><br><br>

            <label for="study">Select qualification :</label>
            <select id="study" name="study">
                <option value="hignschool">High School</option>
                <option value="graduate">Graduate</option>
                <option value="postgraduate">Post Graduate</option>
            </select><br><br>

            <label>Select gender :</label>
            <input type="radio" id="male" name="gender">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender">
            <label for="male">Female</label>
            <input type="radio" id="other" name="gender">
            <label for="other">Other</label> <br><br>
            
            <label for="Message">Message :</label>
            <textarea name="Message" id="Message" rows="4" cols="50" placeholder="Enter your message"></textarea><br><br>

            <label for="dob">Date of birth :</label>
            <input type="date" name="dob" id="dob"> <br><br>

            <label for="file">Upload a resume :</label>
            <input type="file" name="file" id="file"> <br><br>

            <label for="color">Choose your favourite color :</label>
            <input type="color" name="color" id="color"> <br><br>

            <label for="news">Subscribe to newsletter :</label>
            <input type="checkbox" name="news" id="news"> <br><br>

            <input type="submit" value="Reset">
            <input type="submit" value="Submit">
        </form>

    </body>
